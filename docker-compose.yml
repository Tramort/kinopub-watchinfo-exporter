services:
  exporter:
    build: .
    image: ghcr.io/tramort/kinopub-watchinfo-exporter:latest
    env_file: .env
    environment:
      CRON_SCHEDULE: "0 */6 * * *"
    volumes:
      - ./data:/app/data
    command: ["kinopub-exporter.py"]
    restart: unless-stopped

  importer:
    image: ghcr.io/tramort/kinopub-watchinfo-exporter:latest
    depends_on:
      - exporter
    env_file: .env
    environment:
      CRON_SCHEDULE: "15 */6 * * *"
    volumes:
      - ./data:/app/data
    # Non-interactive mode required for scheduled runs.
    command: ["traktv-importer.py", "--mismatch-auto-approve"]
    restart: unless-stopped

  nextup:
    container_name: traktv-nextup
    image: ghcr.io/tramort/kinopub-watchinfo-exporter:latest
    depends_on:
      - importer
    env_file: .env
    environment:
      CRON_SCHEDULE: "30 */6 * * *"
    volumes:
      - ./data:/app/data
    command: ["trakt-nextup.py"]
    restart: unless-stopped
